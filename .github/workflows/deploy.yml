name: Deploy Azure Function

on:
  push:
    branches:
      - main

# These permissions are required for OIDC — GitHub must be able to request
# a token from Azure AD on behalf of this workflow.
permissions:
  id-token: write   # Allows the workflow to mint an OIDC token
  contents: read    # Allows checkout

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────────────
      # Must match the runtime version configured in the Function App.
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install dependencies ───────────────────────────────────────────────
      # Azure Functions deployment expects dependencies installed into
      # .python_packages/lib/site-packages relative to the project root.
      # The ENABLE_ORYX_BUILD app setting (set by default) can handle this
      # server-side too, but installing locally is more explicit and reliable.
    #   - name: Install dependencies
    #     run: |
    #       python -m pip install --upgrade pip
    #       pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      # ── 4. Authenticate to Azure via OIDC ────────────────────────────────────
      # Uses the federated credential created by setup-azure.sh. No client
      # secret is stored — Azure AD validates the GitHub-issued JWT directly.
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── 5. Deploy to Azure Functions ─────────────────────────────────────────
      # Uses the Azure Functions Action which zips and pushes the project via
      # the Kudu deployment API. The SCM_DO_BUILD_DURING_DEPLOYMENT setting
      # is respected if you prefer server-side builds.
      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTION_APP_NAME }}
          package: "."
          scm-do-build-during-deployment: true
          enable-oryx-build: true